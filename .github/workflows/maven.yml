# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6.0.2

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check code formatting with Spotless
        run: ./mvnw spotless:check

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@328bc84c3b00a990a151418144fd682a4eb76ea6 # v0.19.0
        with:
          installMirrorNode: true

      - name: Wait for Mirror Node
        run: |
          echo "Waiting for Mirror Node REST (Node.js) on http://localhost:5551..."
          until curl --output /dev/null --silent --fail http://localhost:5551/health/readiness; do
            echo "Mirror Node (rest) not ready, waiting..."
            kubectl get svc -n solo || true
            curl --silent http://localhost:5551/health/readiness || echo "No response from mirrorNode REST readiness"
            sleep 5
          done
          echo "Waiting for Mirror Node REST-Java on http://localhost:8084..."
          until curl --output /dev/null --silent --fail http://localhost:8084/actuator/health/readiness; do
            echo "Mirror Node (rest-java) not ready, waiting..."
            curl --silent http://localhost:8084/actuator/health/readiness || echo "No response from REST-Java readiness"
            sleep 5
          done
          echo "Mirror Node APIs are ready!"

      - name: Build with Maven
        env:
          SPRING_PROFILES_ACTIVE: solo
          HEDERA_ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
          HEDERA_PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          HEDERA_NETWORK: hiero-solo-action
        run: ./mvnw verify
