# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout Repo
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 25
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Check code formatting with Spotless
        run: ./mvnw spotless:check

      - name: Prepare Hiero Solo
        id: solo
        uses: hiero-ledger/hiero-solo-action@531a2b283ca4912df537d64bf89da0f6be4c2574 # v0.22.0
        with:
          installMirrorNode: true
          hieroVersion: v0.66.0
          mirrorNodeVersion: v0.138.0
          mirrorNodePortGrpc: 5600
          mirrorNodePortWeb3Rest: 8545

      - name: Wait for Mirror Node
        run: |
          echo "Waiting for Mirror Node REST API to be ready on http://localhost:38081..."
          until curl --output /dev/null --silent --head --fail http://localhost:38081/api/v1/network/supply; do
            echo "Mirror Node not ready, waiting..."
            kubectl get svc -n solo
            curl --silent http://localhost:38081/api/v1/network/supply || echo "No response from /api/v1/network/supply"
            sleep 5
          done
          echo "Mirror Node REST API is ready!"

      - name: Build with Maven
        env:
          SPRING_PROFILES_ACTIVE: solo
          HEDERA_ACCOUNT_ID: ${{ steps.solo.outputs.accountId }}
          HEDERA_PRIVATE_KEY: ${{ steps.solo.outputs.privateKey }}
          HEDERA_NETWORK: hiero-solo-action
        run: ./mvnw verify
