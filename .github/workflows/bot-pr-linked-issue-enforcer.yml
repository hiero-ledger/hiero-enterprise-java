# Closes pull requests immediately when they are not linked to an open issue,
# or when the PR author is not assigned to the linked issue.
#
# Uses pull_request so the workflow can be tested from a feature branch before
# it exists on main. After merging to main, consider adding pull_request_target
# as well so fork PRs can be closed (pull_request only has write access for
# same-repository branches).

name: PR Linked Issue Enforcer

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_number:
        description: PR number to check
        required: true
        type: number
      dry_run:
        description: Log actions without closing the PR
        required: false
        type: boolean
        default: true

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: linked-issue-enforcer-${{ github.event.pull_request.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  enforce-linked-issue:
    # pull_request cannot write to fork PRs; skip those until pull_request_target is enabled on main.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout enforcer scripts
        uses: actions/checkout@v6.0.2
        with:
          # pull_request: merge commit includes scripts from the PR branch.
          # workflow_dispatch: tip of the selected branch.
          ref: ${{ github.sha }}
          sparse-checkout: .github/scripts
          sparse-checkout-cone-mode: false

      - name: Enforce linked issue and assignment
        uses: actions/github-script@v7
        env:
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run && 'true' || 'false' }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || '' }}
          REQUIRE_AUTHOR_ASSIGNED: 'true'
        with:
          script: |
            const script = require('./.github/scripts/bot-pr-linked-issue-enforcer.js');
            await script({ github, context, core });
