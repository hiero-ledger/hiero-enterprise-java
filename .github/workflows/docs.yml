name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - ".github/workflows/docs-preview.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - ".github/workflows/docs-preview.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "docs-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        run: pip install zensical==0.0.36

      - name: Build site
        run: zensical build --clean

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site

  # PR preview: build only, upload the site as an artifact.
  # The deploy to gh-pages/pr/<number>/ runs in docs-preview.yml via
  # workflow_run, so fork PRs can also get a preview without granting
  # write access to PR-controlled code.
  build-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Install docs dependencies
        run: pip install zensical==0.0.36

      - name: Build site
        run: zensical build --clean

      - name: Save PR metadata
        run: |
          mkdir -p pr
          echo "${{ github.event.pull_request.number }}" > pr/NR

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-preview
          path: |
            site
            pr
          if-no-files-found: error
          retention-days: 7
