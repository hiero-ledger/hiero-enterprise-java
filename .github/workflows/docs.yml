name: Docs
on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "zensical.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: "pages-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install --require-hashes -r docs/requirements.txt

      - name: Set site_url for GitHub Pages
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: |
          python3 <<'PY'
          import os, re
          url = os.environ["SITE_URL"].rstrip("/") + "/"
          path = "zensical.toml"
          text = open(path, encoding="utf-8").read()
          # Normalize line endings to avoid insertion bugs
          text = text.replace("\r\n", "\n")
          if re.search(r"^site_url\s*=", text, re.M):
            text = re.sub(r"^site_url\s*=.*$", "site_url = " + repr(url), text, count=1, flags=re.M)
          else:
            text = text.replace("[project]\n", "[project]\nsite_url = " + repr(url) + "\n", 1)
          open(path, "w", encoding="utf-8").write(text)
          PY
      - name: Build site
        run: zensical build --clean -f zensical.toml

      - name: Deploy to gh-pages (production)
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          enable_jekyll: false
          keep_files: true

  # PR preview: build and deploy to .../pr/<number>/
  deploy-preview:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.x"

      - name: Install Zensical
        run: pip install --require-hashes -r docs/requirements.txt

      - name: Set site_url for PR preview
        env:
          SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr/${{ github.event.pull_request.number }}/
        run: |
          python3 <<'PY'
          import os, re
          url = os.environ["SITE_URL"].rstrip("/") + "/"
          path = "zensical.toml"
          text = open(path, encoding="utf-8").read()
          text = text.replace("\r\n", "\n")
          if re.search(r"^site_url\s*=", text, re.M):
            text = re.sub(r"^site_url\s*=.*$", "site_url = " + repr(url), text, count=1, flags=re.M)
          else:
            text = text.replace("[project]\n", "[project]\nsite_url = " + repr(url) + "\n", 1)
          open(path, "w", encoding="utf-8").write(text)
          PY

      - name: Build site
        run: zensical build --clean -f zensical.toml

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.0.1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: pr/${{ github.event.pull_request.number }}
          enable_jekyll: false
          keep_files: true

      - name: Comment PR with preview URL
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const url = `https://${context.repo.owner}.github.io/${context.repo.repo}/pr/${context.issue.number}/`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📖 **Docs preview** for this PR: ${url}`
            });