name: Docs Preview Deploy

# Runs after the "Docs" workflow completes. Because workflow_run runs in
# the base-repo context, it has a writable GITHUB_TOKEN even when the
# originating run was a fork PR. This lets us deploy a /pr/<number>/
# preview for any PR without giving PR-controlled code access to secrets.
on:
  workflow_run:
    workflows: ["Docs"]
    types: [completed]

permissions:
  actions: read        # download the artifact from the triggering Docs run
  contents: write      # push the preview to gh-pages
  pull-requests: write # comment the preview URL on the PR

concurrency:
  group: "docs-preview-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}"
  cancel-in-progress: true

jobs:
  deploy:
    if: >
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Download preview artifact
        uses: actions/download-artifact@fa0a91b85d4f404e444e00e005971372dc801d16 # v4.1.8
        with:
          name: docs-preview
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve PR number from workflow_run payload
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fromPayload = context.payload.workflow_run.pull_requests?.[0]?.number;
            if (Number.isInteger(fromPayload) && fromPayload > 0) {
              core.setOutput('number', String(fromPayload));
              return;
            }

            const headSha = context.payload.workflow_run.head_sha;
            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.payload.workflow_run.head_repository.owner.login}:${context.payload.workflow_run.head_branch}`,
            });

            const pr = prs.find((candidate) => candidate.head.sha === headSha);
            if (!pr || !Number.isInteger(pr.number) || pr.number <= 0) {
              core.setFailed(`Could not resolve PR number for head SHA ${headSha}`);
              return;
            }

            core.setOutput('number', String(pr.number));

      - name: Deploy PR preview to gh-pages
        uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          destination_dir: "pr/${{ steps.pr.outputs.number }}"

      # Pass the PR number through env rather than ${{ }} interpolation so no
      # attacker-controlled text can be expanded into the inline script body.
      - name: Comment PR with preview URL
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const prNumber = Number(process.env.PR_NUMBER);
            const url = `https://hiero-ledger.github.io/hiero-enterprise-java/pr/${prNumber}/`;
            await github.rest.issues.createComment({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `📖 **Docs preview** for this PR: ${url}`
            });
