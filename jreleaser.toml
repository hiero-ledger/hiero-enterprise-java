[signing.pgp]
active = "ALWAYS"
armored = true
mode = "COMMAND"

[deploy.maven.mavenCentral.release-deploy]
active = "RELEASE"
url = "https://central.sonatype.com/api/v1/publisher"
stagingRepositories = ["target/staging-deploy"]
applyMavenCentralRules = true

retryDelay = 20
maxRetries = 400

[release.github]
owner = "hiero-ledger"
name = "hiero-enterprise-java"
skipTag = true
skipRelease = false
overwrite = true

[release.github.update]
enabled = true
sections = ["ASSETS", "BODY"]

[release.github.changelog]
enabled = true
formatted = "ALWAYS"
