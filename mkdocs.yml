# Technical documentation for Hiero Enterprise Java
# Rendered as GitHub Pages via .github/workflows/docs.yml

site_name: Hiero Enterprise Java — Technical Documentation
site_description: Technical documentation for Hiero Enterprise Java (Spring & MicroProfile integrations for Hiero)
site_url: https://hiero-ledger.github.io/hiero-enterprise-java/
repo_url: https://github.com/hiero-ledger/hiero-enterprise-java

theme:
  name: material
  favicon: assets/favicon.ico
  logo: assets/logo.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - scheme: default
      primary: hiero
      accent: hiero
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: hiero
      accent: hiero
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.tabs.link
    - content.code.copy
    - content.code.annotate
    - navigation.tabs
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - navigation.instant
    - navigation.tracking
    - search.suggest
    - search.highlight
    - toc.integrate

extra_css:
  - stylesheets/extra.css

extra:
  version:
    provider: mike
    default: latest

plugins:
  - search
  - git-revision-date-localized:
      enable_creation_date: true
      fallback_to_build_date: true
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.keys

nav:
  - Home: index.md
  - Getting started: getting-started.md
  - Architecture: architecture.md
  - Spring Boot: spring-boot.md
  - MicroProfile: microprofile.md
  - Base / Managed services: managed-services.md
  - Contributing to the docs: contributing.md
